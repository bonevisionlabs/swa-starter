name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "api/**"
      - ".github/workflows/**"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "site/**"
      - "api/**"
      - ".github/workflows/**"

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # ---- Configure these for your project ----
          app_location: "site"       # Frontend source code path
          api_location: "api"        # Azure Functions API path (optional)
          output_location: ""        # Build output directory (empty = no build step)
          skip_app_build: true       # Set to false if you have a build step (React, Vue, etc.)
          skip_deploy_on_missing_secrets: true  # Passes silently until you add AZURE_STATIC_WEB_APPS_API_TOKEN

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
